<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0e1116" />
<title>消消乐</title>
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="../../icon-192.png" />
<style>
  :root {
    --bg: #0e1116; --panel: #11151c; --line: #222a36; --line2: #2a3445;
    --text: #e6edf3; --muted: #8b98a9; --faint: #5b6675; --accent: #3e63dd;
    --money: #56d364; --chips: #3e63dd; --mult: #ffb224; --blind: #e5484d;
    --g0: #e5484d; --g1: #ffb224; --g2: #46a758; --g3: #3e63dd; --g4: #8e4ec6;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { padding: max(14px, env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom));
    max-width: 460px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .back { color: var(--muted); text-decoration: none; font-size: 20px; line-height: 1; padding: 4px; }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .spacer { flex: 1; }
  .lvl { color: var(--muted); font-size: 13px; }
  .lvl b { color: var(--text); font-size: 15px; }
  .goalbar { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 10px 12px; margin-bottom: 10px; }
  .goalrow { display: flex; justify-content: space-between; align-items: baseline; }
  .goalrow .target { color: var(--blind); font-size: 13px; } .goalrow .target b { font-size: 18px; font-weight: 700; }
  .goalrow .moves { color: var(--muted); font-size: 13px; } .goalrow .moves b { color: var(--text); font-size: 18px; font-weight: 700; }
  .prog { height: 6px; background: #222a36; border-radius: 4px; margin: 8px 0 6px; overflow: hidden; }
  #progfill { height: 100%; width: 0%; background: var(--money); transition: width .4s ease; }
  .scoreline { color: var(--muted); font-size: 12px; }
  .scoreline b { color: var(--money); font-size: 16px; font-weight: 700; }
  .resolve { text-align: center; min-height: 26px; margin-bottom: 8px; opacity: 0; transition: opacity .25s; }
  .resolve .c { color: var(--chips); font-weight: 700; font-size: 18px; }
  .resolve .m { color: var(--mult); font-weight: 700; font-size: 18px; }
  .resolve .t { color: var(--money); font-weight: 700; font-size: 22px; }
  .resolve .op { color: var(--faint); font-size: 14px; margin: 0 4px; }
  #board { display: grid; gap: 5px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 16px; padding: 7px; touch-action: none; user-select: none; }
  #board.shake { animation: bshake .3s ease; }
  @keyframes bshake { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-5px,2px)} 40%{transform:translate(5px,-2px)} 60%{transform:translate(-4px,1px)} 80%{transform:translate(4px,0)} }
  .cell { position: relative; aspect-ratio: 1; }
  .gem { position: absolute; inset: 5%; border-radius: 22%; transition: transform .12s ease, opacity .14s ease; transform-origin: center;
    display: flex; align-items: center; justify-content: center; font-size: 17px; line-height: 1; color: rgba(0,0,0,.46); }
  /* shape + color: each type carries a distinct glyph so color isn't the only cue (colorblind-safe) */
  .gem.g0 { background: var(--g0); } .gem.g0::before { content: "\25CF"; }
  .gem.g1 { background: var(--g1); } .gem.g1::before { content: "\25B2"; }
  .gem.g2 { background: var(--g2); } .gem.g2::before { content: "\25C6"; }
  .gem.g3 { background: var(--g3); } .gem.g3::before { content: "\2605"; }
  .gem.g4 { background: var(--g4); } .gem.g4::before { content: "\2B22"; }
  /* special tiles (4-match → line clear, 5-match → color bomb); placed after the
     color rules so their glyph + ring win the cascade */
  .gem.sp { box-shadow: inset 0 0 0 2px rgba(255,255,255,.92); }
  .gem.sp-line::before { content: "\271A"; color: rgba(0,0,0,.72); font-size: 21px; }
  .gem.sp-bomb::before { content: "\2738"; color: rgba(255,255,255,.95); font-size: 21px; }
  .cell.sel .gem { transform: scale(.84); box-shadow: 0 0 0 3px var(--text); }
  .gem.clearing { transform: scale(0); opacity: 0; }
  @keyframes nope { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-12%)} 75%{transform:translateX(12%)} }
  .cell.nope .gem { animation: nope .26s ease; }
  .footer { margin-top: auto; padding-top: 16px; display: flex; align-items: center; gap: 12px; }
  .footer .hint { color: var(--muted); font-size: 12.5px; line-height: 1.6; flex: 1; }
  button.new { background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 12px; padding: 9px 16px; font-size: 14px; cursor: pointer; }
  button.new:active { transform: scale(.97); }
  .overlay { position: fixed; inset: 0; background: rgba(8,10,14,.86); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; z-index: 10; padding: 24px; text-align: center; }
  .overlay[hidden] { display: none; }   /* class selector beats UA [hidden]; restore the hide */
  .overlay h2 { margin: 0; font-size: 26px; } .overlay .sub { color: var(--muted); font-size: 14px; }
  .overlay .big { color: var(--money); font-size: 40px; font-weight: 700; margin: 6px 0; }
  .overlay .btns { display: flex; gap: 10px; margin-top: 16px; }
  .overlay button { border-radius: 12px; padding: 12px 22px; font-size: 15px; cursor: pointer; border: 1px solid var(--line2); }
  .overlay button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .overlay button.secondary { background: transparent; color: var(--text); }
  .overlay button:active { transform: scale(.97); }
</style>
</head>
<body>
<header>
  <a class="back" href="../../" aria-label="返回盒子">‹</a>
  <h1>消消乐</h1>
  <span class="spacer"></span>
  <div class="lvl">第 <b id="level">1</b> 关</div>
</header>

<div class="goalbar">
  <div class="goalrow">
    <span class="target">过关线 <b id="target">0</b></span>
    <span class="moves">步数 <b id="moves">0</b></span>
  </div>
  <div class="prog"><div id="progfill"></div></div>
  <div class="scoreline">本关 <b id="score">0</b> · 总分 <span id="run">0</span> · 最高 <span id="best">0</span></div>
</div>

<div class="resolve" id="resolve"></div>
<div id="board" aria-label="消除棋盘"></div>

<div class="footer">
  <div class="hint">拖动方块和相邻一颗交换。凑三连消除,<b>连锁拉高倍率</b> —— 分数 = 基础 × 倍率。N 步内达过关线。</div>
  <button class="new" id="new">重开</button>
</div>

<div class="overlay" id="overlay" hidden>
  <h2 id="ov-title"></h2>
  <div class="sub" id="ov-sub"></div>
  <div class="big" id="ov-big"></div>
  <div class="btns">
    <button id="ov-resume" class="primary">继续本局 +5 步</button>
    <button id="ov-new" class="secondary">从头开始</button>
  </div>
</div>

<script type="module">
import { Grid, EMPTY, rng, randInt, collapseDown, fillEmpty } from "../../shared/grid-core.js";

const W = 8, H = 8, COLORS = 5;
const BASE_TARGET = 500, MOVES = 12, GROWTH = 1.7, REVIVE_MOVES = 5;
const boardEl = document.getElementById("board");
boardEl.style.gridTemplateColumns = `repeat(${W}, 1fr)`;
const $ = (id) => document.getElementById(id);

let grid, level, target, movesLeft, levelScore, runScore, best, busy, over, sel, next;
let gen = 0;   // generation token: a reset (start/resume/revive) bumps it; in-flight async aborts when it changes

const targetFor = (lv) => Math.round(BASE_TARGET * Math.pow(GROWTH, lv - 1));
const newTile = () => randInt(next, COLORS);

// --- persistence: resume an in-progress run; death ends it but keeps best ----
const RUN_KEY = "match3.run", BEST_KEY = "match3.best";
function saveRun() {
  try { localStorage.setItem(RUN_KEY, JSON.stringify({ cells: grid.cells, level, target, movesLeft, levelScore, runScore })); } catch (e) {}
}
function clearRun() { try { localStorage.removeItem(RUN_KEY); } catch (e) {} }
function loadRun() { try { return JSON.parse(localStorage.getItem(RUN_KEY) || "null"); } catch (e) { return null; } }
function loadBest() { try { return Number(localStorage.getItem(BEST_KEY)) || 0; } catch (e) { return 0; } }
function bumpBest() { if (runScore > best) { best = runScore; $("best").textContent = best; try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {} } }

// --- tiny Web Audio juice (first user gesture unlocks it) ---------------------
let actx;
function beep(freq, dur = 0.06, type = "triangle", gain = 0.05) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq; g.gain.value = gain;
    o.connect(g); g.connect(actx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
    o.stop(actx.currentTime + dur);
  } catch (e) {}
}
function countUp(el, from, to, ms = 450) {
  const t0 = performance.now();
  (function step(t) {
    const k = Math.min(1, (t - t0) / ms);
    el.textContent = Math.round(from + (to - from) * k);
    if (k < 1) requestAnimationFrame(step);
  })(performance.now());
}

function freshBoard() {
  grid = new Grid(W, H);
  grid.forEach((_, x, y) => {
    let v;
    do { v = newTile(); }
    while ((x >= 2 && grid.get(x - 1, y) === v && grid.get(x - 2, y) === v) ||
           (y >= 2 && grid.get(x, y - 1) === v && grid.get(x, y - 2) === v));
    grid.set(x, y, v);
  });
}

// A cell is a plain color (int 0..COLORS-1), a special { c, s:'line'|'bomb' }, or EMPTY.
const colorOf = (v) => v == null ? null : (v.s ? v.c : v);
const isSpecial = (v) => !!(v && v.s);

// Find all >=3 runs by color. Returns matched cells (hits) + the runs (for
// 4/5-match special spawning).
function findMatches(g) {
  const hit = new Set(), runs = [];
  const scan = (get, mode) => {
    const outer = mode === "row" ? g.h : g.w, inner = mode === "row" ? g.w : g.h;
    for (let a = 0; a < outer; a++) {
      let run = 1;
      for (let b = 1; b <= inner; b++) {
        const cc = b < inner ? colorOf(get(a, b)) : null, pc = colorOf(get(a, b - 1));
        if (cc !== null && cc === pc) run++;
        else {
          if (run >= 3) {
            const idxs = [];
            for (let k = 1; k <= run; k++) { const bb = b - k; idxs.push(mode === "row" ? g.idx(bb, a) : g.idx(a, bb)); }
            idxs.forEach((i) => hit.add(i)); runs.push({ idxs, len: run, c: pc });
          }
          run = 1;
        }
      }
    }
  };
  scan((a, b) => g.get(b, a), "row");
  scan((a, b) => g.get(a, b), "col");
  return { hits: hit, runs };
}

// Expand a clear-set through any special tiles it contains, cascading:
// line → its whole row + column; bomb → every tile of its color.
function activateSpecials(set) {
  const work = [...set].filter((i) => isSpecial(grid.cells[i]));
  const seen = new Set(work);
  while (work.length) {
    const i = work.pop(), v = grid.cells[i]; if (!isSpecial(v)) continue;
    const x = i % W, y = (i / W) | 0, add = [];
    if (v.s === "line") { for (let xx = 0; xx < W; xx++) add.push(y * W + xx); for (let yy = 0; yy < H; yy++) add.push(yy * W + x); }
    else { grid.forEach((vv, xx, yy) => { if (vv !== EMPTY && colorOf(vv) === v.c) add.push(yy * W + xx); }); }
    add.forEach((j) => { set.add(j); if (isSpecial(grid.cells[j]) && !seen.has(j)) { seen.add(j); work.push(j); } });
  }
}

// Which cell of a 4/5-run becomes the special (prefer the swapped cell, else middle).
function spawnCell(run, swapCell) {
  if (swapCell) { const si = swapCell.y * W + swapCell.x; if (run.idxs.includes(si)) return si; }
  return run.idxs[Math.floor(run.idxs.length / 2)];
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function render() {
  boardEl.replaceChildren();
  grid.forEach((v, x, y) => {
    const cell = document.createElement("div");
    cell.className = "cell" + (sel && sel.x === x && sel.y === y ? " sel" : "");
    cell.dataset.x = x; cell.dataset.y = y;
    if (v !== EMPTY) {
      const gem = document.createElement("div");
      gem.className = "gem g" + colorOf(v) + (v.s === "line" ? " sp sp-line" : v.s === "bomb" ? " sp sp-bomb" : "");
      cell.appendChild(gem);
    }
    boardEl.appendChild(cell);
  });
}

function updateProgress() {
  $("progfill").style.width = Math.min(100, (levelScore / target) * 100) + "%";
}
function showResolve(chips, mult, total) {
  const el = $("resolve");
  el.innerHTML = total == null
    ? `<span class="c">${chips}</span><span class="op">×</span><span class="m">${mult}</span>`
    : `<span class="c">${chips}</span><span class="op">×</span><span class="m">${mult}</span><span class="op">=</span><span class="t">${total}</span>`;
  el.style.opacity = "1";
  clearTimeout(showResolve._t);
  if (total != null) showResolve._t = setTimeout(() => { el.style.opacity = "0"; }, 1100);
}
function shakeBoard() { boardEl.classList.remove("shake"); void boardEl.offsetWidth; boardEl.classList.add("shake"); }
function nope(a, b) { [a, b].forEach((p) => { const c = boardEl.children[p.y * W + p.x]; if (c) c.classList.add("nope"); }); }

// resolve a move's cascade: accumulate chips + mult, score once as chips × mult
async function resolve(swapCell, seed) {
  const g = gen;
  let chips = 0, mult = 0, firstCascade = true;
  if (seed && seed.size) {                            // swap-activated special: fire it before matching
    const clear = new Set(seed);
    activateSpecials(clear);
    mult++; chips += clear.size * 10;
    beep(520, 0.06, "sawtooth", 0.05); showResolve(chips, mult);
    clear.forEach((i) => { const cell = boardEl.children[i]; const gem = cell && cell.firstChild; if (gem) gem.classList.add("clearing"); grid.cells[i] = EMPTY; });
    await sleep(150); if (gen !== g) return 0;
    collapseDown(grid); fillEmpty(grid, newTile); render();
    await sleep(110); if (gen !== g) return 0;
    firstCascade = false;
  }
  while (true) {
    const { hits, runs } = findMatches(grid);
    if (hits.size === 0) break;
    const clear = new Set(hits);
    activateSpecials(clear);                          // line/bomb tiles caught in the clear fire their effect
    const spawns = new Map();                          // 4-run → line, 5+-run → bomb
    runs.forEach((r) => { if (r.len >= 4) { const idx = spawnCell(r, firstCascade ? swapCell : null); if (idx != null && !spawns.has(idx)) spawns.set(idx, { c: r.c, s: r.len >= 5 ? "bomb" : "line" }); } });
    spawns.forEach((_, idx) => clear.delete(idx));     // spawn cell transforms instead of clearing
    mult++; chips += clear.size * 10;
    beep(420 + mult * 120, 0.05);
    showResolve(chips, mult);
    clear.forEach((i) => { const cell = boardEl.children[i]; const gem = cell && cell.firstChild; if (gem) gem.classList.add("clearing"); grid.cells[i] = EMPTY; });
    await sleep(150);
    if (gen !== g) return 0;                          // reset mid-cascade → abort before touching the board
    spawns.forEach((sp, idx) => { grid.cells[idx] = sp; });
    collapseDown(grid); fillEmpty(grid, newTile); render();
    await sleep(110);
    if (gen !== g) return 0;
    firstCascade = false;
  }
  if (mult === 0 || gen !== g) return 0;
  const moveScore = chips * mult;
  if (mult >= 3) { shakeBoard(); beep(660, 0.12, "sawtooth", 0.05); }
  const before = levelScore;
  levelScore += moveScore; runScore += moveScore;
  countUp($("score"), before, levelScore);
  $("run").textContent = runScore;
  showResolve(chips, mult, moveScore);
  updateProgress();
  return moveScore;
}

async function levelUp() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.12, "triangle", 0.05), i * 90));
  level++; target = targetFor(level); movesLeft = MOVES; levelScore = 0;
  $("level").textContent = level; $("target").textContent = target;
  $("moves").textContent = movesLeft; $("score").textContent = "0";
  updateProgress();
  const el = $("resolve");
  el.innerHTML = `<span class="t">过关!→ 第 ${level} 关</span>`; el.style.opacity = "1";
  await sleep(900); el.style.opacity = "0";
}

function gameOver() {
  over = true;
  bumpBest(); saveRun();       // keep the run so 继续本局 / reopen can resume it
  [330, 247, 165].forEach((f, i) => setTimeout(() => beep(f, 0.2, "sine", 0.05), i * 130));
  $("ov-title").textContent = "步数用尽";
  $("ov-sub").textContent = `第 ${level} 关 · 差 ${target - levelScore} 分过线 · 最高 ${best}`;
  $("ov-big").textContent = runScore + " 分";
  $("overlay").hidden = false;
}

function reviveRun() {          // 继续本局:同盘同分,补 +5 步接着打
  gen++;
  over = false; busy = false;
  movesLeft += REVIVE_MOVES;
  $("overlay").hidden = true;
  $("moves").textContent = movesLeft;
  saveRun();
}

async function trySwap(a, b) {
  if (busy || over) return;
  busy = true; sel = null;
  const g = gen;
  grid.swap(a.x, a.y, b.x, b.y); render(); await sleep(130);
  if (gen !== g) return;                              // reset mid-swap → abort (resetter owns busy)
  const seed = new Set();                              // swapping a special tile always activates it
  [a, b].forEach((p) => { if (isSpecial(grid.get(p.x, p.y))) seed.add(p.y * W + p.x); });
  if (seed.size === 0 && findMatches(grid).hits.size === 0) {
    grid.swap(a.x, a.y, b.x, b.y); render(); nope(a, b); await sleep(280);
    if (gen === g) busy = false;
    return;
  }
  movesLeft--; $("moves").textContent = movesLeft;
  await resolve(b, seed.size ? seed : null);
  if (gen !== g) return;                              // reset during resolve → abort
  if (levelScore >= target) await levelUp();
  else if (movesLeft <= 0) gameOver();
  if (gen !== g) return;
  if (!over) saveRun();        // persist in-progress run for resume
  busy = false;
}

// input: drag a gem to a neighbor to swap; tap-then-adjacent-tap also works
let drag = null;
const cellAt = (t) => { const c = t.closest && t.closest(".cell"); return c ? { x: +c.dataset.x, y: +c.dataset.y } : null; };
boardEl.addEventListener("pointerdown", (e) => {
  if (busy || over) return; const c = cellAt(e.target); if (!c) return;
  drag = { ...c, sx: e.clientX, sy: e.clientY, moved: false };
});
boardEl.addEventListener("pointermove", (e) => {
  if (!drag || busy || drag.moved) return;
  const dx = e.clientX - drag.sx, dy = e.clientY - drag.sy;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 16) return;
  drag.moved = true;
  let nx = drag.x, ny = drag.y;
  if (Math.abs(dx) > Math.abs(dy)) nx += dx > 0 ? 1 : -1; else ny += dy > 0 ? 1 : -1;
  const from = { x: drag.x, y: drag.y }; drag = null;
  if (nx < 0 || nx >= W || ny < 0 || ny >= H) { sel = null; render(); return; }
  sel = null; trySwap(from, { x: nx, y: ny });
});
function endDrag() {
  if (!drag) return;
  if (!drag.moved && !busy && !over) {
    const x = drag.x, y = drag.y;
    if (!sel) sel = { x, y };
    else if (sel.x === x && sel.y === y) sel = null;
    else if (Math.abs(sel.x - x) + Math.abs(sel.y - y) === 1) { const a = sel; drag = null; trySwap(a, { x, y }); return; }
    else sel = { x, y };
    render();
  }
  drag = null;
}
boardEl.addEventListener("pointerup", endDrag);
boardEl.addEventListener("pointercancel", () => { drag = null; });

function toast(msg) {
  const el = $("resolve");
  el.innerHTML = `<span style="color:var(--muted);font-size:13px">${msg}</span>`;
  el.style.opacity = "1";
  clearTimeout(showResolve._t);
  setTimeout(() => { el.style.opacity = "0"; }, 1500);
}

function paintHud() {
  $("level").textContent = level; $("target").textContent = target; $("moves").textContent = movesLeft;
  $("score").textContent = levelScore; $("run").textContent = runScore; $("best").textContent = best;
  $("resolve").style.opacity = "0"; $("overlay").hidden = true; updateProgress();
}

function start() {                         // fresh run (重开 / 再来一把)
  gen++;
  clearRun();
  next = rng((Date.now() & 0xffffffff) >>> 0);
  level = 1; target = targetFor(1); movesLeft = MOVES; levelScore = 0; runScore = 0;
  busy = false; over = false; sel = null;
  paintHud(); freshBoard(); render(); saveRun();
}

function resume(s) {                        // continue an in-progress run
  gen++;
  next = rng((Date.now() & 0xffffffff) >>> 0);
  grid = new Grid(W, H); grid.cells = s.cells.slice();
  level = s.level; target = s.target; movesLeft = s.movesLeft; levelScore = s.levelScore; runScore = s.runScore;
  busy = false; over = false; sel = null;
  paintHud(); render();
  if (movesLeft <= 0 && levelScore < target) gameOver();   // reopened at a failed run → show the two choices
  else toast("已恢复上次进度");
}

$("new").addEventListener("click", start);
$("ov-new").addEventListener("click", start);
$("ov-resume").addEventListener("click", reviveRun);
addEventListener("pagehide", () => { if (!over && grid) saveRun(); });   // belt-and-suspenders

best = loadBest();
const saved = loadRun();
if (saved && Array.isArray(saved.cells) && saved.cells.length === W * H) resume(saved);
else start();

if ("serviceWorker" in navigator) {
  addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
</script>
</body>
</html>
